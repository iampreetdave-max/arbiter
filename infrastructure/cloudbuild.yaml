# cloudbuild.yaml — Google Cloud Build CI/CD pipeline for Arbiter
#
# Triggers:
#   - Push to main branch → deploy both backend and frontend to Cloud Run
#   - Manual trigger via: gcloud builds submit
#
# Required Cloud Build substitutions:
#   _REGION: asia-south1
#   _FIREBASE_PROJECT_ID: your-firebase-project
#   _GCS_BUCKET: arbiter-documents

steps:
  # ── Step 1: Run backend tests ─────────────────────────────────────────────────────────
  - name: python:3.11-slim
    id: backend-tests
    entrypoint: bash
    args:
      - -c
      - |
        pip install -r arbiter/backend/requirements.txt --quiet
        cd $PWD
        GEMINI_API_KEY=test \
        GOOGLE_CLOUD_PROJECT=test \
        FIREBASE_PROJECT_ID=test \
        RAZORPAY_KEY_ID=rzp_test \
        RAZORPAY_KEY_SECRET=test_secret \
        GCS_BUCKET_NAME=test \
        ENVIRONMENT=test \
        pytest arbiter/tests/ -v --tb=short -m "not integration and not slow" \
          --cov=arbiter/backend --cov-fail-under=50
    waitFor: ['-']

  # ── Step 2: Build backend Docker image ─────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-backend
    args:
      - build
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/arbiter/backend:$COMMIT_SHA
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/arbiter/backend:latest
      - -f
      - arbiter/backend/Dockerfile
      - arbiter/backend/
    waitFor: [backend-tests]

  # ── Step 3: Build frontend Docker image ───────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-frontend
    args:
      - build
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/arbiter/frontend:$COMMIT_SHA
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/arbiter/frontend:latest
      - --build-arg
      - NEXT_PUBLIC_API_URL=https://arbiter-backend-$PROJECT_ID.$_REGION.run.app
      - -f
      - arbiter/frontend/Dockerfile
      - arbiter/frontend/
    waitFor: ['-']

  # ── Step 4: Push images to Artifact Registry ───────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push-backend
    args: [push, $_REGION-docker.pkg.dev/$PROJECT_ID/arbiter/backend:$COMMIT_SHA]
    waitFor: [build-backend]

  - name: gcr.io/cloud-builders/docker
    id: push-frontend
    args: [push, $_REGION-docker.pkg.dev/$PROJECT_ID/arbiter/frontend:$COMMIT_SHA]
    waitFor: [build-frontend]

  # ── Step 5: Deploy backend to Cloud Run ─────────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-backend
    entrypoint: gcloud
    args:
      - run
      - deploy
      - arbiter-backend
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/arbiter/backend:$COMMIT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --concurrency=80
      - --timeout=300s
      - --set-env-vars=ENVIRONMENT=production,GOOGLE_CLOUD_PROJECT=$PROJECT_ID
      - --set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest,RAZORPAY_KEY_ID=RAZORPAY_KEY_ID:latest,RAZORPAY_KEY_SECRET=RAZORPAY_KEY_SECRET:latest
    waitFor: [push-backend]

  # ── Step 6: Deploy frontend to Cloud Run ───────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-frontend
    entrypoint: gcloud
    args:
      - run
      - deploy
      - arbiter-frontend
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/arbiter/frontend:$COMMIT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
    waitFor: [push-frontend]

substitutions:
  _REGION: asia-south1

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1800s
