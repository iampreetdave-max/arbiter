# Deploy to Staging — runs when code is merged to `develop` branch
# Deploys backend + frontend to Cloud Run staging services
name: Deploy to Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:  # Allow manual trigger

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID_STAGING }}
  REGION: asia-south1
  BACKEND_SERVICE: arbiter-backend-staging
  FRONTEND_SERVICE: arbiter-frontend-staging
  ARTIFACT_REGISTRY: asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID_STAGING }}/arbiter

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_STAGING }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev

      # ── Backend ──────────────────────────────────────────────────────────
      - name: Build backend Docker image
        run: |
          docker build -t ${{ env.ARTIFACT_REGISTRY }}/backend-staging:${{ github.sha }} \
            -t ${{ env.ARTIFACT_REGISTRY }}/backend-staging:latest \
            -f arbiter/backend/Dockerfile \
            arbiter/backend/

      - name: Push backend image
        run: |
          docker push ${{ env.ARTIFACT_REGISTRY }}/backend-staging:${{ github.sha }}
          docker push ${{ env.ARTIFACT_REGISTRY }}/backend-staging:latest

      - name: Deploy backend to Cloud Run (staging)
        run: |
          gcloud run deploy ${{ env.BACKEND_SERVICE }} \
            --image=${{ env.ARTIFACT_REGISTRY }}/backend-staging:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --set-env-vars="ENVIRONMENT=staging" \
            --set-secrets="GEMINI_API_KEY=GEMINI_API_KEY_STAGING:latest,FIREBASE_PROJECT_ID=FIREBASE_PROJECT_ID_STAGING:latest,RAZORPAY_KEY_ID=RAZORPAY_KEY_ID_STAGING:latest,RAZORPAY_KEY_SECRET=RAZORPAY_KEY_SECRET_STAGING:latest" \
            --memory=1Gi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=5 \
            --concurrency=100 \
            --timeout=300

      - name: Get staging backend URL
        id: backend-url
        run: |
          URL=$(gcloud run services describe ${{ env.BACKEND_SERVICE }} --region=${{ env.REGION }} --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT

      # ── Frontend ─────────────────────────────────────────────────────────
      - name: Build frontend Docker image
        env:
          NEXT_PUBLIC_API_URL: ${{ steps.backend-url.outputs.url }}
        run: |
          docker build -t ${{ env.ARTIFACT_REGISTRY }}/frontend-staging:${{ github.sha }} \
            --build-arg NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }} \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY_STAGING }} \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN_STAGING }} \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID_STAGING }} \
            --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET_STAGING }} \
            --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_SENDER_ID_STAGING }} \
            --build-arg NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID_STAGING }} \
            --build-arg NEXT_PUBLIC_RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID_STAGING }} \
            -f arbiter/frontend/Dockerfile \
            arbiter/frontend/

      - name: Push frontend image
        run: docker push ${{ env.ARTIFACT_REGISTRY }}/frontend-staging:${{ github.sha }}

      - name: Deploy frontend to Cloud Run (staging)
        run: |
          gcloud run deploy ${{ env.FRONTEND_SERVICE }} \
            --image=${{ env.ARTIFACT_REGISTRY }}/frontend-staging:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --allow-unauthenticated \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=3

      - name: Get staging frontend URL
        id: frontend-url
        run: |
          URL=$(gcloud run services describe ${{ env.FRONTEND_SERVICE }} --region=${{ env.REGION }} --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Smoke test staging
        run: |
          echo "Testing staging backend health..."
          curl -f ${{ steps.backend-url.outputs.url }}/health || echo "Health check failed"
          echo ""
          echo "✅ Staging deployment complete!"
          echo "Backend:  ${{ steps.backend-url.outputs.url }}"
          echo "Frontend: ${{ steps.frontend-url.outputs.url }}"

      - name: Comment on PR with staging URLs
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚀 Staging Deployment Ready\n\n| Service | URL |\n|---------|-----|\n| Backend | ${{ steps.backend-url.outputs.url }} |\n| Frontend | ${{ steps.frontend-url.outputs.url }} |\n\nCommit: \`${{ github.sha }}\``
            })
