# Deploy to Production — runs on version tags (v*.*.*)
# Requires manual approval via GitHub Environment protection rules
name: Deploy to Production

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DEPLOY to confirm production deployment'
        required: true

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID_PROD }}
  REGION: asia-south1
  BACKEND_SERVICE: arbiter-backend
  FRONTEND_SERVICE: arbiter-frontend
  ARTIFACT_REGISTRY: asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID_PROD }}/arbiter

jobs:
  validate:
    name: Validate Production Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Validate manual trigger confirmation
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DEPLOY" ]; then
            echo "❌ Confirmation not provided. Type DEPLOY to confirm."
            exit 1
          fi
          echo "✅ Production deployment confirmed."

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: validate
    environment: production  # Requires manual approval in GitHub Settings → Environments

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Production)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_PROD }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev

      - name: Get version tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      # ── Backend ──────────────────────────────────────────────────────────────────
      - name: Build + push backend (production)
        run: |
          docker build \
            -t ${{ env.ARTIFACT_REGISTRY }}/backend:${{ steps.version.outputs.tag }} \
            -t ${{ env.ARTIFACT_REGISTRY }}/backend:latest \
            -f arbiter/backend/Dockerfile \
            arbiter/backend/
          docker push ${{ env.ARTIFACT_REGISTRY }}/backend:${{ steps.version.outputs.tag }}
          docker push ${{ env.ARTIFACT_REGISTRY }}/backend:latest

      - name: Deploy backend to Cloud Run (production)
        run: |
          gcloud run deploy ${{ env.BACKEND_SERVICE }} \
            --image=${{ env.ARTIFACT_REGISTRY }}/backend:${{ steps.version.outputs.tag }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --set-env-vars="ENVIRONMENT=production" \
            --set-secrets="GEMINI_API_KEY=GEMINI_API_KEY:latest,FIREBASE_PROJECT_ID=FIREBASE_PROJECT_ID:latest,RAZORPAY_KEY_ID=RAZORPAY_KEY_ID:latest,RAZORPAY_KEY_SECRET=RAZORPAY_KEY_SECRET:latest,SENTRY_DSN=SENTRY_DSN:latest,ADMIN_SECRET_KEY=ADMIN_SECRET_KEY:latest" \
            --memory=2Gi \
            --cpu=2 \
            --min-instances=1 \
            --max-instances=20 \
            --concurrency=200 \
            --timeout=300

      - name: Get production backend URL
        id: backend-url
        run: |
          URL=$(gcloud run services describe ${{ env.BACKEND_SERVICE }} --region=${{ env.REGION }} --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT

      # ── Frontend ──────────────────────────────────────────────────────────────────
      - name: Build + push frontend (production)
        run: |
          docker build \
            -t ${{ env.ARTIFACT_REGISTRY }}/frontend:${{ steps.version.outputs.tag }} \
            -t ${{ env.ARTIFACT_REGISTRY }}/frontend:latest \
            --build-arg NEXT_PUBLIC_API_URL=${{ steps.backend-url.outputs.url }} \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY_PROD }} \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN_PROD }} \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID_PROD }} \
            --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET_PROD }} \
            --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_SENDER_ID_PROD }} \
            --build-arg NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID_PROD }} \
            --build-arg NEXT_PUBLIC_RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID_PROD }} \
            -f arbiter/frontend/Dockerfile \
            arbiter/frontend/
          docker push ${{ env.ARTIFACT_REGISTRY }}/frontend:${{ steps.version.outputs.tag }}
          docker push ${{ env.ARTIFACT_REGISTRY }}/frontend:latest

      - name: Deploy frontend to Cloud Run (production)
        run: |
          gcloud run deploy ${{ env.FRONTEND_SERVICE }} \
            --image=${{ env.ARTIFACT_REGISTRY }}/frontend:${{ steps.version.outputs.tag }} \
            --region=${{ env.REGION }} \
            --allow-unauthenticated \
            --memory=1Gi \
            --cpu=2 \
            --min-instances=1 \
            --max-instances=10

      - name: Smoke test production
        run: |
          sleep 30  # Wait for Cloud Run to finish routing
          curl -f ${{ steps.backend-url.outputs.url }}/health
          echo "✅ Production health check passed!"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          body: |
            ## Arbiter ${{ steps.version.outputs.tag }}

            ### Deployment
            - Backend: ${{ steps.backend-url.outputs.url }}
            - Environment: Production (Google Cloud Run, asia-south1)

            ### What's New
            See HANDOFF.md for session details.
          draft: false
          prerelease: false
